<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Registrácia ŠPZ – Pešia zóna BB</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --bb-primary: #1a3c6e;
      --bb-accent:  #c8973e;
    }
    body { background: #f5f6fa; }

    /* ── Navbar ── */
    .navbar-bb {
      background: var(--bb-primary);
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
    }
    .navbar-bb .navbar-brand { font-weight: 600; font-size: .95rem; color: #fff; line-height: 1.2; }
    .navbar-bb .navbar-brand small { color: rgba(255,255,255,.65); font-weight: 400; }
    .city-logo { height: 42px; filter: drop-shadow(0 1px 2px rgba(0,0,0,.3)); }

    /* ── Login page ── */
    .login-page {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, var(--bb-primary) 0%, #2d5aa0 100%);
    }
    .login-card { width: 100%; max-width: 420px; border: none; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
    .login-header { background: #fff; border-radius: 12px 12px 0 0; padding: 2rem; text-align: center; border-bottom: 3px solid var(--bb-accent); }
    .login-header h5 { color: var(--bb-primary); font-weight: 700; margin-bottom: .15rem; }
    .login-header small { color: #6c757d; }

    /* ── Cards ── */
    .card { border: none; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
    .card-header-bb { background: var(--bb-primary); color: #fff; border-radius: 10px 10px 0 0 !important; font-weight: 600; padding: .85rem 1.2rem; }
    .card-header-admin { background: #2d3748; color: #fff; border-radius: 10px 10px 0 0 !important; font-weight: 600; padding: .85rem 1.2rem; }

    /* ── Buttons ── */
    .btn-bb  { background: var(--bb-primary); border-color: var(--bb-primary); color: #fff; }
    .btn-bb:hover  { background: #152f57; border-color: #152f57; color: #fff; }
    .btn-accent { background: var(--bb-accent); border-color: var(--bb-accent); color: #fff; }
    .btn-accent:hover { background: #a8761e; border-color: #a8761e; color: #fff; }

    /* ── Language toggle ── */
    .lang-switch .btn { padding: .15rem .45rem; font-size: .75rem; font-weight: 600; }
    .lang-switch .btn.active { background: rgba(255,255,255,.25); }

    /* ── List group tweaks ── */
    .list-group-item { border-left: none; border-right: none; }
    .list-group-item:first-child { border-top: none; }

    /* ── Permission block ── */
    .perm-badge { background: rgba(26,60,110,.07); border-radius: 8px; padding: 1rem; }

    /* ── Admin section ── */
    .admin-section { border-left: 4px solid var(--bb-accent); }

    /* ── Toasts ── */
    .toast-container { z-index: 9999; }
  </style>
</head>
<body>

<!-- Toast container -->
<div class="toast-container position-fixed top-0 end-0 p-3"></div>

<!-- ══════════════ LOGIN PAGE ══════════════ -->
<div id="login-page" class="login-page">
  <div class="login-card card">
    <div class="login-header">
      <img src="/static/erb-bb.png" alt="Logo mesta Banská Bystrica" height="60" class="mb-3">
      <h5 data-i18n="page-title">Registrácia ŠPZ</h5>
      <small data-i18n="page-subtitle">Pešia zóna – Banská Bystrica</small>
    </div>
    <div class="card-body p-4">
      <form id="login-form">
        <div class="mb-3">
          <label class="form-label fw-semibold" data-i18n="label-email">Email</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" class="form-control" id="email" data-i18n-placeholder="placeholder-email" placeholder="vas@email.sk" required>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold" data-i18n="label-password">Heslo</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control" id="password" placeholder="••••••••" required>
          </div>
        </div>
        <button type="submit" class="btn btn-bb w-100 py-2 mb-3" id="login-btn">
          <i class="bi bi-box-arrow-in-right me-2"></i><span data-i18n="login-btn">Prihlásiť sa</span>
        </button>
        <div class="text-center">
          <div class="btn-group lang-switch" role="group">
            <button type="button" class="btn btn-outline-secondary lang-btn" data-lang="sk" onclick="setLang('sk')">SK</button>
            <button type="button" class="btn btn-outline-secondary lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- ══════════════ MAIN APP ══════════════ -->
<div id="app" style="display:none;">

  <!-- Navbar -->
  <nav class="navbar navbar-bb sticky-top">
    <div class="container-fluid">
      <span class="navbar-brand d-flex align-items-center gap-2">
        <img src="/static/erb-bb.png" alt="Logo mesta BB" class="city-logo" style="filter:brightness(0) invert(1);">
        <span><span data-i18n="nav-title">Registrácia ŠPZ</span><br><small data-i18n="nav-subtitle">Pešia zóna – Banská Bystrica</small></span>
      </span>
      <div class="d-flex align-items-center gap-2">
        <div class="btn-group lang-switch" role="group">
          <button type="button" class="btn btn-sm btn-outline-light lang-btn" data-lang="sk" onclick="setLang('sk')">SK</button>
          <button type="button" class="btn btn-sm btn-outline-light lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
        </div>
        <button id="logout" class="btn btn-sm btn-outline-light">
          <i class="bi bi-box-arrow-right me-1"></i><span data-i18n="btn-logout">Odhlásiť</span>
        </button>
      </div>
    </div>
  </nav>

  <div class="container py-4">
    <div class="row g-4">

      <!-- Vozidlá -->
      <div class="col-md-6">
        <div class="card h-100">
          <div class="card-header-bb d-flex align-items-center gap-2">
            <i class="bi bi-car-front-fill"></i> <span data-i18n="card-vehicles">Vaše vozidlá</span>
          </div>
          <div class="card-body p-0">
            <ul id="vehicle-list" class="list-group list-group-flush"></ul>
          </div>
          <div class="card-footer bg-white border-top p-3">
            <form id="add-vehicle-form">
              <div class="input-group">
                <input type="text" class="form-control" id="spz" data-i18n-placeholder="placeholder-spz" placeholder="Napr. BA123AB" required>
                <button class="btn btn-success" type="submit">
                  <i class="bi bi-plus-lg"></i> <span data-i18n="btn-add">Pridať</span>
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>

      <!-- Povolenie + Zmena hesla -->
      <div class="col-md-6 d-flex flex-column gap-4">
        <div class="card">
          <div class="card-header-bb d-flex align-items-center gap-2">
            <i class="bi bi-shield-check"></i> <span data-i18n="card-permission">Vaše povolenie</span>
          </div>
          <div class="card-body">
            <div id="permission-info">
              <p class="text-muted mb-0"><i class="bi bi-info-circle me-1"></i><span data-i18n="no-permission">Povolenie nie je nastavené.</span></p>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-header-bb d-flex align-items-center gap-2">
            <i class="bi bi-key"></i> <span data-i18n="card-change-password">Zmena hesla</span>
          </div>
          <div class="card-body">
            <form id="change-password-form">
              <div class="mb-2">
                <input type="password" class="form-control" id="old-password" data-i18n-placeholder="placeholder-old-password" placeholder="Aktuálne heslo" required>
              </div>
              <div class="mb-3">
                <input type="password" class="form-control" id="new-password" data-i18n-placeholder="placeholder-new-password" placeholder="Nové heslo (min. 8 znakov)" required>
                <div id="pw-strength" class="mt-2" style="display:none;">
                  <div class="progress mb-1" style="height:4px;">
                    <div id="pw-strength-bar" class="progress-bar" style="width:0%;transition:width .3s,background-color .3s"></div>
                  </div>
                  <small id="pw-strength-label" class="text-muted"></small>
                </div>
              </div>
              <button type="submit" class="btn btn-outline-secondary w-100">
                <i class="bi bi-arrow-repeat me-1"></i><span data-i18n="btn-change-password">Zmeniť heslo</span>
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- ── ADMIN PANEL ── -->
    <div id="admin-panel" class="mt-4" style="display:none;">
      <div class="card admin-section">
        <div class="card-header-admin d-flex align-items-center gap-2">
          <i class="bi bi-gear-fill"></i> <span data-i18n="card-admin">Administrácia</span>
        </div>
        <div class="card-body p-4">
          <div class="row g-4">

            <!-- Vytvoriť + Import -->
            <div class="col-lg-5">
              <h6 class="fw-bold mb-3"><i class="bi bi-person-plus me-1"></i><span data-i18n="admin-create-user">Vytvoriť používateľa</span></h6>
              <form id="admin-create-user-form" class="mb-4">
                <input type="email" class="form-control mb-2" id="new-user-email" data-i18n-placeholder="placeholder-new-email" placeholder="Email" required>
                <input type="password" class="form-control mb-2" id="new-user-password" data-i18n-placeholder="placeholder-new-password" placeholder="Heslo" required>
                <div class="form-check mb-2">
                  <input class="form-check-input" type="checkbox" id="new-user-is-admin">
                  <label class="form-check-label" for="new-user-is-admin" data-i18n="label-admin-account">Admin účet</label>
                </div>
                <button type="submit" class="btn btn-bb w-100">
                  <i class="bi bi-person-plus me-1"></i><span data-i18n="btn-create">Vytvoriť</span>
                </button>
              </form>

              <h6 class="fw-bold mb-2"><i class="bi bi-upload me-1"></i><span data-i18n="admin-import">Import používateľov</span></h6>
              <textarea id="import-data" class="form-control mb-2" rows="4"
                        data-i18n-placeholder="placeholder-import"
                        placeholder="email,heslo[,admin] – jeden na riadok"></textarea>
              <button id="import-btn" class="btn btn-outline-success w-100">
                <i class="bi bi-file-earmark-arrow-up me-1"></i><span data-i18n="btn-import">Importovať</span>
              </button>
            </div>

            <!-- Zoznam používateľov -->
            <div class="col-lg-7">
              <div class="d-flex align-items-center justify-content-between mb-2">
                <h6 class="fw-bold mb-0">
                  <input class="form-check-input me-1" type="checkbox" id="select-all-users" title="Vybrať všetkých">
                  <i class="bi bi-people me-1"></i><span data-i18n="admin-users">Používatelia</span>
                </h6>
                <div class="d-flex gap-2">
                  <button id="delete-users-btn" class="btn btn-danger btn-sm" disabled>
                    <i class="bi bi-trash me-1"></i><span data-i18n="btn-delete">Zmazať</span>
                  </button>
                  <button id="export-btn" class="btn btn-outline-primary btn-sm">
                    <i class="bi bi-download me-1"></i><span data-i18n="btn-export">Export CSV</span>
                  </button>
                </div>
              </div>
              <input type="text" class="form-control form-control-sm mb-2" id="search-users"
                     data-i18n-placeholder="placeholder-search"
                     placeholder="Vyhľadať podľa emailu...">
              <ul id="user-list" class="list-group" style="max-height:400px;overflow-y:auto;"></ul>
            </div>
          </div>

          <!-- Povolenie + vozidlá vybraného používateľa -->
          <div class="row g-4 mt-1">
            <div class="col-lg-5">
              <h6 class="fw-bold mb-3"><i class="bi bi-sliders me-1"></i><span data-i18n="admin-set-permission">Nastaviť povolenie</span></h6>
              <form id="set-permission-form">
                <input type="hidden" id="target-user-id">
                <div class="mb-2">
                  <input type="number" class="form-control" id="daily-entries"
                         data-i18n-placeholder="placeholder-daily-entries"
                         placeholder="Počet vstupov denne" required>
                </div>
                <div class="mb-3">
                  <input type="text" class="form-control" id="time-window"
                         data-i18n-placeholder="placeholder-time-window"
                         placeholder="Časové okno (napr. 04:00 - 09:00)" required>
                </div>
                <button type="submit" class="btn btn-accent w-100">
                  <i class="bi bi-check-lg me-1"></i><span data-i18n="btn-save-permission">Uložiť povolenie</span>
                </button>
              </form>
            </div>

            <div class="col-lg-7">
              <div id="admin-vehicle-list" class="mb-3"></div>
              <form id="admin-add-vehicle-form" style="display:none;">
                <div class="input-group">
                  <input type="text" class="form-control" id="admin-new-spz"
                         data-i18n-placeholder="placeholder-admin-spz"
                         placeholder="Nová ŠPZ pre používateľa">
                  <button class="btn btn-success" type="submit">
                    <i class="bi bi-plus-lg"></i> <span data-i18n="btn-add">Pridať</span>
                  </button>
                </div>
              </form>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

      'vehicle-spz-delete-err': 'Failed to remove',

      'date-locale': 'en-GB',
      'pw-weak': 'Weak',
      'pw-fair': 'Fair',
      'pw-good': 'Good',
      'pw-strong': 'Strong',
    }
  };

  let lang = localStorage.getItem('lang') || 'sk';

  function t(key) {
    return (translations[lang] && translations[lang][key]) || translations.sk[key] || key;
  }

  function applyTranslations() {
    document.documentElement.lang = lang;
    document.querySelectorAll('[data-i18n]').forEach(el => {
      el.textContent = t(el.dataset.i18n);
    });
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
      el.placeholder = t(el.dataset.i18nPlaceholder);
    });
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.lang === lang);
      btn.classList.toggle('fw-bold', btn.dataset.lang === lang);
    });
  }

  function setLang(newLang) {
    lang = newLang;
    localStorage.setItem('lang', lang);
    applyTranslations();
    // Re-render dynamic content if the app is visible
    if (currentUser) {
      loadVehicles();
      loadPermission();
      if (currentUser.is_admin) loadUserList(document.getElementById('search-users').value);
    }
  }

  applyTranslations();

  /* ── Loading spinner ── */
  function spinner() {
    return '<div class="text-center py-3"><div class="spinner-border spinner-border-sm text-secondary"></div></div>';
  }

  /* ── Toast notifikácie ── */
  function showToast(message, type = 'success') {
    const icons = { success: 'bi-check-circle-fill', danger: 'bi-exclamation-triangle-fill', warning: 'bi-info-circle-fill' };
    const container = document.querySelector('.toast-container');
    const el = document.createElement('div');
    el.className = `toast align-items-center text-bg-${type} border-0`;
    el.setAttribute('role', 'alert');
    el.innerHTML = `
      <div class="d-flex">
        <div class="toast-body"><i class="bi ${icons[type] || icons.success} me-2"></i>${message}</div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>`;
    container.appendChild(el);
    const toast = new bootstrap.Toast(el, { delay: 3500 });
    toast.show();
    el.addEventListener('hidden.bs.toast', () => el.remove());
  }

  /* ── Auth check pri načítaní ── */
  async function checkAuth() {
    const res = await fetch(API_BASE + '/me', { credentials: 'include' });
    if (res.ok) showApp(await res.json());
  }
  checkAuth();

  function showApp(user) {
    currentUser = user;
    document.getElementById('login-page').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadVehicles();
    loadPermission();
    if (user.is_admin) {
      document.getElementById('admin-panel').style.display = 'block';
      loadUserList();
    }
  }

  /* ── Prihlásenie ── */
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span>${t('logging-in')}`;
    const res = await fetch(API_BASE + '/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({ username: document.getElementById('email').value, password: document.getElementById('password').value }),
      credentials: 'include'
    });
    btn.disabled = false;
    btn.innerHTML = `<i class="bi bi-box-arrow-in-right me-2"></i><span data-i18n="login-btn">${t('login-btn')}</span>`;
    if (res.ok) {
      const me = await fetch(API_BASE + '/me', { credentials: 'include' });
      showApp(await me.json());
    } else {
      showToast(t('err-login'), 'danger');
    }
  });

  /* ── Odhlásenie ── */
  document.getElementById('logout').addEventListener('click', async () => {
    await fetch(API_BASE + '/logout', { method: 'POST', credentials: 'include' });
    currentUser = null;
    location.reload();
  });

  /* ── Vozidlá ── */
  async function loadVehicles() {
    const list = document.getElementById('vehicle-list');
    list.innerHTML = `<li class="list-group-item">${spinner()}</li>`;
    const res = await fetch(API_BASE + '/vehicles', { credentials: 'include' });
    const vehicles = await res.json();
    list.innerHTML = '';
    if (!vehicles.length) {
      list.innerHTML = `<li class="list-group-item text-muted py-3"><i class="bi bi-info-circle me-1"></i>${t('no-vehicles')}</li>`;
      return;
    }
    vehicles.forEach(v => {
      const li = document.createElement('li');
      li.className = 'list-group-item d-flex justify-content-between align-items-center';
      li.innerHTML = `<span><i class="bi bi-car-front me-2 text-muted"></i><strong>${v.spz}</strong></span>
        <button class="btn btn-sm btn-outline-danger" onclick="deleteUserVehicle('${v.id}')"><i class="bi bi-trash"></i></button>`;
      list.appendChild(li);
    });
  }

  async function deleteUserVehicle(vehicleId) {
    if (!confirm(t('confirm-delete-vehicle'))) return;
    const res = await fetch(`${API_BASE}/vehicles/${vehicleId}`, { method: 'DELETE', credentials: 'include' });
    if (res.ok) { loadVehicles(); showToast(t('vehicle-deleted')); }
    else showToast(t('vehicle-delete-err'), 'danger');
  }

  document.getElementById('add-vehicle-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const spz = document.getElementById('spz').value;
    const res = await fetch(API_BASE + '/vehicles', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      credentials: 'include', body: JSON.stringify({ spz })
    });
    if (res.ok) { document.getElementById('spz').value = ''; loadVehicles(); showToast(t('vehicle-added')); }
    else { const err = await res.json(); showToast(err.detail || t('vehicle-add-err'), 'danger'); }
  });

  /* ── Povolenie ── */
  async function loadPermission() {
    document.getElementById('permission-info').innerHTML = spinner();
    const res = await fetch(API_BASE + '/permissions', { credentials: 'include' });
    if (res.ok) {
      const perm = await res.json();
      document.getElementById('permission-info').innerHTML = `
        <div class="perm-badge">
          <div class="d-flex align-items-center gap-3">
            <div class="text-center">
              <div class="fs-1 fw-bold" style="color:var(--bb-primary);line-height:1">${perm.daily_entries}</div>
              <small class="text-muted">${t('entries-per-day')}</small>
            </div>
            <div class="vr"></div>
            <div><i class="bi bi-clock me-1 text-muted"></i><strong>${perm.time_window}</strong></div>
          </div>
        </div>`;
    }
  }

  /* ── Sila hesla ── */
  const pwStrengthLevels = [
    { key: 'pw-weak',  color: '#dc3545', width: '25%' },
    { key: 'pw-fair',  color: '#fd7e14', width: '50%' },
    { key: 'pw-good',  color: '#0dcaf0', width: '75%' },
    { key: 'pw-strong',color: '#198754', width: '100%' },
  ];

  document.getElementById('new-password').addEventListener('input', (e) => {
    const pw = e.target.value;
    const bar = document.getElementById('pw-strength-bar');
    const label = document.getElementById('pw-strength-label');
    const wrap = document.getElementById('pw-strength');
    if (!pw) { wrap.style.display = 'none'; return; }
    let score = 0;
    if (pw.length >= 8) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;
    if (pw.length >= 12) score++;
    const level = pwStrengthLevels[Math.max(0, score - 1)];
    bar.style.width = pw.length < 8 ? '10%' : level.width;
    bar.style.backgroundColor = pw.length < 8 ? '#dc3545' : level.color;
    label.textContent = pw.length < 8 ? `${t('pw-weak')} – min. 8` : t(level.key);
    label.style.color = pw.length < 8 ? '#dc3545' : level.color;
    wrap.style.display = 'block';
  });

  /* ── Zmena hesla ── */
  document.getElementById('change-password-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const res = await fetch(`${API_BASE}/change-password`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'include',
      body: JSON.stringify({ old_password: document.getElementById('old-password').value, new_password: document.getElementById('new-password').value })
    });
    if (res.ok) { showToast(t('password-changed')); e.target.reset(); }
    else { const err = await res.json(); showToast(err.detail || t('general-err'), 'danger'); }
  });

  /* ── Admin: zoznam používateľov ── */
  function debounce(fn, d) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), d); }; }
  document.getElementById('search-users').addEventListener('input', debounce(() => loadUserList(document.getElementById('search-users').value), 300));

  async function loadUserList(filter = '') {
    const list = document.getElementById('user-list');
    list.innerHTML = spinner();
    const res = await fetch(API_BASE + '/admin/users', { credentials: 'include' });
    const users = await res.json();
    list.innerHTML = '';
    for (const u of users) {
      if (!u.email.toLowerCase().includes(filter.toLowerCase())) continue;
      const permInfo = u.daily_entries != null
        ? `<span class="badge bg-success-subtle text-success">${u.daily_entries}× • ${u.time_window}</span>`
        : '';
      const li = document.createElement('li');
      li.className = 'list-group-item list-group-item-action';
      const lastLogin = u.last_login
        ? new Date(u.last_login).toLocaleString(t('date-locale'))
        : t('never');
      li.innerHTML = `
        <div class="d-flex align-items-center gap-2">
          <input class="form-check-input user-checkbox flex-shrink-0" type="checkbox" value="${u.id}">
          <div class="flex-grow-1" style="cursor:pointer;overflow:hidden">
            <div class="d-flex flex-wrap align-items-center gap-1">
              <strong>${u.email}</strong>
              ${u.is_admin ? '<span class="badge bg-warning text-dark">admin</span>' : ''}
              ${permInfo}
            </div>
            <small class="text-muted">
              <i class="bi bi-box-arrow-in-right me-1"></i>${u.login_count ?? 0}×
              &nbsp;•&nbsp;${lastLogin}
            </small>
          </div>
        </div>`;
      li.querySelector('.flex-grow-1').addEventListener('click', async () => {
        document.getElementById('target-user-id').value = u.id;
        if (selectedUserElement) selectedUserElement.classList.remove('active');
        li.classList.add('active'); selectedUserElement = li;
        await loadAdminUserVehicles(u.id);
        document.getElementById('set-permission-form').scrollIntoView({ behavior: 'smooth' });
      });
      list.appendChild(li);
    }
  }

  document.getElementById('user-list').addEventListener('change', () => {
    const checked = document.querySelectorAll('.user-checkbox:checked').length;
    const total = document.querySelectorAll('.user-checkbox').length;
    document.getElementById('delete-users-btn').disabled = !checked;
    document.getElementById('select-all-users').indeterminate = checked > 0 && checked < total;
    document.getElementById('select-all-users').checked = checked === total && total > 0;
  });

  document.getElementById('select-all-users').addEventListener('change', (e) => {
    document.querySelectorAll('.user-checkbox').forEach(cb => cb.checked = e.target.checked);
    document.getElementById('delete-users-btn').disabled = !e.target.checked;
  });

  document.getElementById('delete-users-btn').addEventListener('click', async () => {
    if (!confirm(t('confirm-delete-users'))) return;
    const ids = [...document.querySelectorAll('.user-checkbox:checked')].map(cb => cb.value);
    const res = await fetch(`${API_BASE}/admin/users`, {
      method: 'DELETE', headers: { 'Content-Type': 'application/json' },
      credentials: 'include', body: JSON.stringify(ids)
    });
    if (res.ok) { showToast(t('users-deleted').replace('{n}', ids.length)); loadUserList(); }
    else showToast(t('delete-err'), 'danger');
  });

  /* ── Admin: vozidlá používateľa ── */
  async function loadAdminUserVehicles(userId) {
    const res = await fetch(API_BASE + '/admin/vehicles', { credentials: 'include' });
    const vehicles = (await res.json()).filter(v => v.user_id === userId);
    const container = document.getElementById('admin-vehicle-list');
    container.innerHTML = `<h6 class="fw-bold mb-2"><i class="bi bi-car-front me-1"></i>${t('admin-vehicle-list')}</h6><ul class="list-group list-group-flush"></ul>`;
    const ul = container.querySelector('ul');
    if (!vehicles.length) { ul.innerHTML = `<li class="list-group-item text-muted ps-0">${t('no-vehicles-user')}</li>`; }
    else vehicles.forEach(v => {
      const li = document.createElement('li');
      li.className = 'list-group-item d-flex justify-content-between align-items-center ps-0';
      li.innerHTML = `<span><i class="bi bi-car-front me-2 text-muted"></i><strong>${v.spz}</strong></span>
        <button class="btn btn-sm btn-outline-danger" onclick="deleteVehicle('${v.id}','${userId}')"><i class="bi bi-trash"></i></button>`;
      ul.appendChild(li);
    });
    document.getElementById('admin-add-vehicle-form').style.display = 'block';
  }

  document.getElementById('admin-add-vehicle-form').addEventListener('submit', async e => {
    e.preventDefault();
    const userId = document.getElementById('target-user-id').value;
    if (!userId) { showToast(t('select-user-first'), 'warning'); return; }
    const spz = document.getElementById('admin-new-spz').value;
    const res = await fetch(`${API_BASE}/admin/vehicles/${userId}`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      credentials: 'include', body: JSON.stringify({ spz })
    });
    if (res.ok) { document.getElementById('admin-new-spz').value = ''; await loadAdminUserVehicles(userId); showToast(t('vehicle-spz-added')); }
    else { const err = await res.json(); showToast(err.detail || t('vehicle-spz-add-err'), 'danger'); }
  });

  async function deleteVehicle(vehicleId, userId) {
    if (!confirm(t('confirm-delete-vehicle'))) return;
    const res = await fetch(`${API_BASE}/vehicles/${vehicleId}`, { method: 'DELETE', credentials: 'include' });
    if (res.ok) { await loadAdminUserVehicles(userId); showToast(t('vehicle-spz-deleted')); }
    else showToast(t('vehicle-spz-delete-err'), 'danger');
  }

  /* ── Admin: povolenie ── */
  document.getElementById('set-permission-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const userId = document.getElementById('target-user-id').value;
    if (!userId) { showToast(t('select-user-first'), 'warning'); return; }
    const res = await fetch(`${API_BASE}/admin/permissions/${userId}`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'include',
      body: JSON.stringify({ daily_entries: parseInt(document.getElementById('daily-entries').value), time_window: document.getElementById('time-window').value })
    });
    if (res.ok) { showToast(t('permission-set')); e.target.reset(); loadUserList(); }
    else showToast(t('permission-err'), 'danger');
  });

  /* ── Export CSV ── */
  document.getElementById('export-btn').addEventListener('click', async () => {
    const res = await fetch(`${API_BASE}/admin/export`, { credentials: 'include' });
    if (res.ok) {
      const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(await res.blob()), download: 'export.csv' });
      a.click(); URL.revokeObjectURL(a.href); showToast(t('export-done'));
    } else showToast(t('export-err'), 'danger');
  });

  /* ── Vytvorenie používateľa (admin) ── */
  document.getElementById('admin-create-user-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const res = await fetch(`${API_BASE}/admin/users?is_admin=${document.getElementById('new-user-is-admin').checked}`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'include',
      body: JSON.stringify({ email: document.getElementById('new-user-email').value, password: document.getElementById('new-user-password').value })
    });
    if (res.ok) { showToast(t('user-created')); e.target.reset(); loadUserList(); }
    else { const err = await res.json(); showToast(err.detail || t('general-err'), 'danger'); }
  });

  /* ── Import ── */
  document.getElementById('import-btn').addEventListener('click', async () => {
    const raw = document.getElementById('import-data').value.trim();
    if (!raw) return;
    const res = await fetch(`${API_BASE}/admin/import`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      credentials: 'include', body: JSON.stringify(raw.split('\n').map(l => l.split(',')))
    });
    if (res.ok) { const d = await res.json(); showToast(d.message); document.getElementById('import-data').value = ''; loadUserList(); }
    else showToast(t('import-err'), 'danger');
  });
</script>
</body>
</html>
