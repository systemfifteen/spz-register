version: '3.9'

services:
  spz:
    build: .
    container_name: spz
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    environment:
      - ALLOWED_ORIGINS=https://spz.poetika.online
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.spz.rule=Host(`spz.poetika.online`)
      - traefik.http.routers.spz.entrypoints=websecure
      - traefik.http.routers.spz.tls.certresolver=letsencrypt
      # voliteľne redirect HTTP→HTTPS
      - traefik.http.routers.spz.middlewares=redirect-to-https

networks:
  proxy:
    external: true
