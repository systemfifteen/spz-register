version: '3.9'

services:
  spz:
    build: .
    container_name: spz
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    environment:
      - ALLOWED_ORIGINS=https://spz.poetika.online
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - proxy
    labels:
      - traefik.enable=true
      # HTTPS router
      - traefik.http.routers.spz.rule=Host(`spz.poetika.online`)
      - traefik.http.routers.spz.entrypoints=https
      - traefik.http.routers.spz.tls.certresolver=letsencrypt
      - traefik.http.services.spz.loadbalancer.server.port=8000
      # HTTP → HTTPS redirect
      - traefik.http.routers.spz-http.rule=Host(`spz.poetika.online`)
      - traefik.http.routers.spz-http.entrypoints=http
      - traefik.http.routers.spz-http.middlewares=https-redirect
      - traefik.http.middlewares.https-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.https-redirect.redirectscheme.permanent=true

networks:
  proxy:
    external: true
